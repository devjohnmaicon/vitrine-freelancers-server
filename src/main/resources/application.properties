spring.application.name=vitrine-freelancers-server

# Database
spring.datasource.url=${DATABASE_USER_URL}:jdbc:postgresql://localhost:5432/database_vitrine
spring.datasource.username=${DATABASE_USER_NAME}:postgres
spring.datasource.password=${DATABASE_USER_PASSWORD}:postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

api.security.token.secret=my-secret-key-vitrine-freelancers

# Configurań§es do Liquibase
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
spring.liquibase.enabled=true
spring.liquibase.default-schema=public
#Config cron || Executa no primeiro minuto de cada hora
spring.task.scheduling.expression=0 1 * * * ?


